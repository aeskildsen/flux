<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SuperSonic – Minimal Example</title>
  <style>
    body {
      font-family: monospace;
      max-width: 480px;
      margin: 60px auto;
      padding: 0 20px;
      background: #111;
      color: #eee;
    }
    h1 { font-size: 1.2rem; margin-bottom: 4px; }
    p  { font-size: 0.85rem; color: #888; margin-top: 0; }
    .buttons { display: flex; gap: 12px; margin-top: 32px; }
    button {
      padding: 10px 22px;
      font-family: monospace;
      font-size: 1rem;
      background: #222;
      color: #eee;
      border: 1px solid #444;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover { background: #333; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    #status {
      margin-top: 24px;
      font-size: 0.85rem;
      color: #aaa;
      min-height: 1.4em;
    }
    #status.error { color: #f66; }
    #status.ok    { color: #6f6; }
  </style>
</head>
<body>
  <h1>SuperSonic – Minimal Example</h1>
  <p>Open DevTools console to see debug output.</p>

  <div class="buttons">
    <button id="boot-btn">boot engine</button>
    <button id="play-btn" disabled>play sound</button>
  </div>
  <div id="status">waiting for boot…</div>

  <script type="module">
    import { SuperSonic } from "https://cdn.jsdelivr.net/npm/supersonic-scsynth@0.57.0/dist/supersonic.js";

    // ── helpers ──────────────────────────────────────────────────────────
    const statusEl = document.getElementById("status");
    function setStatus(msg, kind = "") {
      statusEl.textContent = msg;
      statusEl.className = kind;
      console.log(`[flux] ${msg}`);
    }

    // ── SuperSonic instance ───────────────────────────────────────────────
    // debug:true causes SuperSonic to log scsynth output and OSC messages
    const supersonic = new SuperSonic({
      baseURL:       "https://cdn.jsdelivr.net/npm/supersonic-scsynth@0.57.0/dist/",
      coreBaseURL:   "https://cdn.jsdelivr.net/npm/supersonic-scsynth-core@0.57.0/",
      synthdefBaseURL: "https://cdn.jsdelivr.net/npm/supersonic-scsynth-synthdefs@latest/synthdefs/",
      debug: true,
    });
    console.log("[flux] SuperSonic instance created", supersonic);

    // ── boot button ───────────────────────────────────────────────────────
    const bootBtn = document.getElementById("boot-btn");
    const playBtn = document.getElementById("play-btn");

    bootBtn.onclick = async () => {
      bootBtn.disabled = true;
      try {
        setStatus("calling supersonic.init()…");
        console.log("[flux] calling supersonic.init()");
        await supersonic.init();
        console.log("[flux] supersonic.init() resolved – engine is running");

        setStatus("loading synthdef 'sonic-pi-prophet'…");
        console.log("[flux] calling supersonic.loadSynthDef('sonic-pi-prophet')");
        await supersonic.loadSynthDef("sonic-pi-prophet");
        console.log("[flux] synthdef loaded successfully");

        setStatus("engine ready – click 'play sound'", "ok");
        playBtn.disabled = false;
      } catch (err) {
        console.error("[flux] boot failed:", err);
        setStatus(`boot failed: ${err.message}`, "error");
        bootBtn.disabled = false;
      }
    };

    // ── play button ───────────────────────────────────────────────────────
    playBtn.onclick = () => {
      const args = ["/s_new", "sonic-pi-prophet", -1, 0, 0,
                    "note", 52, "release", 4, "cutoff", 90];
      console.log("[flux] sending OSC:", args);
      supersonic.send(...args);
      console.log("[flux] /s_new sent");
      setStatus("♪ playing…", "ok");
      setTimeout(() => setStatus("engine ready – click 'play sound'", "ok"), 1200);
    };
  </script>
</body>
</html>
