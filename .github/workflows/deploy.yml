name: Deploy to GitHub Pages

on:
  push:
    branches: [main, feature/*]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: latest

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Sync SvelteKit submodule
        run: pnpm --dir svelte-supersonic exec svelte-kit sync

      - name: Test with coverage
        run: pnpm test:coverage

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: latest

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      
      - name: Setup sclang
        env:
          QT_QPA_PLATFORM: offscreen
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends supercollider-language && sclang scripts/install_sclang_dependencies.scd

      - name: Install dependencies
        run: pnpm install
        
      - name: Sync SvelteKit submodule
        run: pnpm --dir svelte-supersonic exec svelte-kit sync
      
      - name: Compile SynthDefs
        env:
          QT_QPA_PLATFORM: offscreen
        run: sclang scripts/compile_synthdefs.scd
        
      - name: Build SvelteKit app
        env:
          BASE_PATH: /flux
        run: pnpm build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5
